<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letícia</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#ffe8f2,#ffd8eb,#fff3f8);
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:none;
  position:relative;
}

.card{
  background:rgba(255,255,255,.52);
  backdrop-filter:blur(14px);
  border-radius:32px;
  padding:45px 60px;
  text-align:center;
  box-shadow:0 18px 45px rgba(201,95,145,.20);
  z-index:10;
  opacity:0;
  transform:translateY(25px) scale(.95);
  animation:cardIn 1.1s ease forwards;
}

@keyframes cardIn{
  to{opacity:1;transform:translateY(0) scale(1)}
}

.title{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:16px;
  margin-bottom:16px;
}

h1{
  font-size:58px;
  color:#c95f91;
}

.heart{
  width:200px;
  height:auto;
  object-fit:contain;
  animation:heartbeat 1.7s ease-in-out infinite;
}

@keyframes heartbeat{
  0%,100%{transform:scale(1) rotate(0deg)}
  25%{transform:scale(1.08) rotate(-3deg)}
  50%{transform:scale(1)}
  70%{transform:scale(1.13) rotate(3deg)}
}

p{
  font-size:27px;
  color:#b84f7d;
  margin:12px 0;
}

.bg-text,.floating{
  position:absolute;
  bottom:-120px;
  user-select:none;
  pointer-events:none;
  animation-name:rise;
  animation-timing-function:linear;
  animation-iteration-count:infinite;
}

.bg-text{
  color:rgba(184,79,125,.10);
  font-weight:bold;
  white-space:nowrap;
  z-index:1;
}

.floating{
  opacity:.42;
  z-index:2;
}

@keyframes rise{
  from{
    transform:translateY(0) rotate(var(--rot));
  }
  to{
    transform:translateY(-130vh) rotate(calc(var(--rot) + 80deg));
  }
}

.sparkle{
  position:absolute;
  width:5px;
  height:5px;
  border-radius:50%;
  background:white;
  box-shadow:0 0 12px white;
  pointer-events:none;
  z-index:3;
  animation:twinkle ease-in-out infinite;
}

@keyframes twinkle{
  0%,100%{opacity:.15;transform:scale(.6)}
  50%{opacity:1;transform:scale(1.5)}
}

.cursor-letter{
  position:fixed;
  pointer-events:none;
  transform:translate(-50%,-50%);
  font-size:25px;
  font-weight:bold;
  color:#d35d98;
  text-shadow:0 0 10px rgba(255,120,180,.55);
  z-index:9999;
  animation:fadeTrail .75s ease forwards;
}

@keyframes fadeTrail{
  to{
    opacity:0;
    transform:translate(-50%,-50%) scale(.55);
  }
}
</style>
</head>

<body>

<div class="card">
  <div class="title">
    <h1>Leticia</h1>
    <img src="Heart.png" class="heart" alt="">
  </div>

  <p>Eu amo a Leticia</p>
  <p>Leticia Leticia Leticia</p>
</div>

<script>
const palavras=[
  "LETICIA",
  "EU AMO LETICIA",
  "EU AMO A LETICIA",
  "MINHA LETICIA",
  "LETICIA É PERFEITA"
];

const itens=["💗","🌸","🌷","♡","❀","✿"];

for(let i=0;i<32;i++){
  const t=document.createElement("div");
  t.className="bg-text";
  t.innerText=palavras[Math.floor(Math.random()*palavras.length)];

  t.style.left=Math.random()*100+"vw";
  t.style.fontSize=(18+Math.random()*28)+"px";
  t.style.animationDuration=(10+Math.random()*14)+"s";
  t.style.animationDelay=(-Math.random()*18)+"s";
  t.style.setProperty("--rot",(Math.random()*80-40)+"deg");

  document.body.appendChild(t);
}

for(let i=0;i<30;i++){
  const f=document.createElement("div");
  f.className="floating";
  f.innerText=itens[Math.floor(Math.random()*itens.length)];

  f.style.left=Math.random()*100+"vw";
  f.style.fontSize=(18+Math.random()*22)+"px";
  f.style.animationDuration=(9+Math.random()*12)+"s";
  f.style.animationDelay=(-Math.random()*18)+"s";
  f.style.setProperty("--rot",(Math.random()*80-40)+"deg");

  document.body.appendChild(f);
}

for(let i=0;i<75;i++){
  const s=document.createElement("div");
  s.className="sparkle";

  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  s.style.animationDuration=(1.5+Math.random()*2.5)+"s";
  s.style.animationDelay=(Math.random()*3)+"s";

  document.body.appendChild(s);
}

const letras=["L","E","T","I","C","I","A"];
let index=0;
let lastTime=0;

document.addEventListener("mousemove",e=>{
  const now=Date.now();
  if(now-lastTime<45) return;
  lastTime=now;

  const letter=document.createElement("div");
  letter.className="cursor-letter";
  letter.innerText=letras[index];

  letter.style.left=e.clientX+"px";
  letter.style.top=e.clientY+"px";

  document.body.appendChild(letter);

  index=(index+1)%letras.length;

  setTimeout(()=>letter.remove(),750);
});
</script>

</body>
</html>
